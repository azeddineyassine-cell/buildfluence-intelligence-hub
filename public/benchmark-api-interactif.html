<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benchmark API Mondial · Interactif · Buildfluence Intelligence · 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Cormorant+Garamond:ital,wght@0,500;1,400;1,500;1,600&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FAF6ED; --paper2:#F3ECDC; --card:#FFFDF8;
  --ink:#23201A; --ink-light:#5A5447; --ink-faint:#8A8170; --muted:#A9A08C;
  --gold:#C9A84C; --gold-deep:#9A7B1E; --gold-pale:#E9DCB4;
  --rule:#E3D9C3; --rule-soft:#EFE7D5;
  --red:#D6453F; --green:#3B6D11; --blue:#185FA5;
  --land:#E7DEC9; --grid:#EDE4CF;
  --shadow:0 18px 40px -28px rgba(80,60,10,.35);
  --display:'Playfair Display',serif; --serif:'Cormorant Garamond',serif;
  --mono:'JetBrains Mono',monospace; --sans:'DM Sans',sans-serif;
}
[data-theme="dark"]{
  --paper:#0D1B2A; --paper2:#102234; --card:#13263A;
  --ink:#F2ECDC; --ink-light:#C2BBA8; --ink-faint:#8C9AAC; --muted:#6E7C8E;
  --gold:#D9B65A; --gold-deep:#E2C879; --gold-pale:#3A4255;
  --rule:#27384C; --rule-soft:#1C2C3E;
  --red:#E24B4A; --green:#5FA32E; --blue:#5B9BD8;
  --land:#1A2C3F; --grid:#1A2A3C;
  --shadow:0 20px 50px -28px rgba(0,0,0,.6);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.65;overflow-x:hidden;transition:background .4s,color .4s;
  background-image:radial-gradient(circle at 18% -10%,rgba(201,168,76,.07),transparent 45%),radial-gradient(circle at 95% 8%,rgba(201,168,76,.05),transparent 40%);}
.wrap{max-width:1240px;margin:0 auto;padding:0 clamp(20px,4vw,56px)}

.topbar{border-bottom:1px solid var(--rule);background:color-mix(in srgb,var(--paper) 85%,transparent);backdrop-filter:blur(8px);position:sticky;top:0;z-index:60}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;gap:14px;min-height:52px;flex-wrap:wrap;padding-top:7px;padding-bottom:7px}
.brand{font-family:var(--mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-light)}
.brand b{color:var(--gold-deep);font-weight:700}
.tb-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.count{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);border:1px solid color-mix(in srgb,var(--red) 40%,transparent);padding:5px 10px;border-radius:3px;white-space:nowrap}
.count b{font-weight:700}
.switch{display:flex;border:1px solid var(--rule);border-radius:4px;overflow:hidden}
.switch button{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;background:transparent;color:var(--ink-faint);border:none;padding:6px 9px;cursor:pointer;transition:all .2s}
.switch button.on{background:var(--ink);color:var(--paper)}
.iconbtn{font-family:var(--mono);font-size:11px;background:transparent;border:1px solid var(--rule);color:var(--ink-light);border-radius:4px;padding:5px 10px;cursor:pointer;transition:all .2s}
.iconbtn:hover{border-color:var(--gold)}

.mininav{position:sticky;top:52px;z-index:55;background:color-mix(in srgb,var(--paper2) 92%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--rule)}
.mininav .wrap{display:flex;gap:4px;flex-wrap:wrap;padding-top:8px;padding-bottom:8px}
.mininav a{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);text-decoration:none;padding:6px 10px;border:1px solid transparent;border-radius:3px;transition:all .2s}
.mininav a:hover{color:var(--gold-deep);border-color:var(--rule);background:var(--card)}

.hero{padding:clamp(40px,6vw,80px) 0 clamp(28px,3vw,44px)}
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:clamp(24px,4vw,52px);align-items:center}
@media(max-width:900px){.hero-grid{grid-template-columns:1fr}}
.kicker{font-family:var(--mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:18px}
.kicker .dot{display:inline-block;width:5px;height:5px;background:var(--gold);border-radius:50%;margin:0 8px 2px;vertical-align:middle}
h1.hero-h1{font-family:var(--display);font-weight:900;font-size:clamp(32px,5vw,64px);line-height:1.02;letter-spacing:-.02em}
h1.hero-h1 em{font-style:italic;color:var(--gold-deep)}
.hero-sub{font-family:var(--serif);font-style:italic;font-size:clamp(16px,1.9vw,21px);color:var(--ink-light);margin-top:18px;max-width:48ch;line-height:1.5}
.map-card{background:var(--card);border:1px solid var(--rule);border-radius:8px;padding:16px;box-shadow:var(--shadow)}
.map-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.map-flags{font-size:16px;letter-spacing:2px}
.map-title{font-family:var(--mono);font-size:8.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint)}
.worldsvg{width:100%;height:auto;display:block;border-radius:5px;background:var(--paper2)}
.geo-land{fill:var(--land);opacity:.85}
.geo-grid{stroke:var(--grid);stroke-width:.6}
.geo-arc{stroke:var(--gold);stroke-width:1;fill:none;stroke-dasharray:3 4;opacity:.5}
.geo-node{cursor:pointer}
.geo-node .ring{transition:r .3s,stroke-width .2s}
.geo-node:hover .ring{stroke-width:3}
.geo-flag{font-size:15px;pointer-events:none}
.geo-cap{font-family:var(--mono);font-size:7.5px;fill:var(--ink-light);pointer-events:none;letter-spacing:.04em}
.map-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.map-legend span{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);display:flex;align-items:center;gap:5px}
.map-legend i{width:9px;height:9px;border-radius:50%;display:inline-block}

.statstrip{display:flex;flex-wrap:wrap;border:1px solid var(--rule);border-radius:5px;overflow:hidden;background:var(--card);margin-top:28px}
.stat{flex:1 1 150px;padding:18px 20px;border-right:1px solid var(--rule)}
.stat:last-child{border-right:none}
.stat .n{font-family:var(--display);font-weight:700;font-size:clamp(26px,3.2vw,38px);line-height:1;color:var(--ink)}
.stat .n.alert{color:var(--red)} .stat .n.win{color:var(--gold-deep)}
.stat .l{font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-top:8px}

.section{padding:clamp(36px,5vw,76px) 0;border-top:1px solid var(--rule)}
.sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:6px;flex-wrap:wrap}
.sec-num{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.1em}
.sec-tag{font-family:var(--mono);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-faint)}
h2.sec-title{font-family:var(--display);font-weight:700;font-size:clamp(24px,3.2vw,38px);line-height:1.08;letter-spacing:-.01em;margin:6px 0 12px;max-width:22ch}
h2.sec-title em{font-style:italic;color:var(--gold-deep)}
.sec-lead{font-family:var(--serif);font-style:italic;font-size:clamp(15px,1.6vw,18px);color:var(--ink-light);max-width:64ch;margin-bottom:28px;line-height:1.5}

.reveal{opacity:0;transform:translateY(24px);transition:opacity .8s cubic-bezier(.2,.7,.2,1),transform .8s cubic-bezier(.2,.7,.2,1)}
.reveal.in{opacity:1;transform:none}

/* annotation "à retenir" */
.takeaway{display:flex;gap:14px;align-items:flex-start;background:var(--paper2);border-left:3px solid var(--gold);border-radius:0 5px 5px 0;padding:16px 20px;margin-top:18px}
.takeaway .ti{font-family:var(--mono);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-deep);flex:0 0 auto;padding-top:3px}
.takeaway p{font-size:14.5px;color:var(--ink-light);line-height:1.55}
.takeaway b{color:var(--ink);font-weight:600}

/* methodo cards */
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--rule);border:1px solid var(--rule);border-radius:6px;overflow:hidden}
@media(max-width:720px){.qa-grid{grid-template-columns:1fr}}
.qa{background:var(--card);padding:22px 24px}
.qa .q{font-family:var(--display);font-weight:700;font-size:17px;color:var(--ink);margin-bottom:8px}
.qa .q span{color:var(--gold-deep)}
.qa .a{font-size:14px;color:var(--ink-light);line-height:1.55}

/* generic card */
.card{background:var(--card);border:1px solid var(--rule);border-radius:6px;box-shadow:var(--shadow)}
.pad{padding:clamp(14px,2vw,26px)}

/* MODULE 1 bubble */
.bubble-grid{display:grid;grid-template-columns:1fr 290px;gap:22px;align-items:stretch}
@media(max-width:840px){.bubble-grid{grid-template-columns:1fr}}
.chart-svg{width:100%;height:auto;display:block;font-family:var(--mono)}
.bubble-axis-label{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;fill:var(--ink-faint)}
.bubble-node{cursor:pointer;transform-box:fill-box;transform-origin:center;transition:transform .25s ease}
.bubble-node circle.fill{transition:r .9s cubic-bezier(.2,.8,.2,1)}
.bubble-node:hover{transform:scale(1.06)}
.bubble-flag{font-size:16px;pointer-events:none}
.bubble-name{font-family:var(--mono);font-size:8px;letter-spacing:.04em;fill:var(--ink);pointer-events:none}
.bub-quadrant{font-family:var(--mono);font-size:8px;letter-spacing:.16em;text-transform:uppercase;fill:var(--muted)}
.bub-info{border-left:2px solid var(--gold);padding:6px 0 6px 18px;align-self:center}
.bub-info .bi-flag{font-size:28px;line-height:1}
.bub-info .bi-name{font-family:var(--display);font-weight:700;font-size:20px;margin-top:6px}
.bub-info .bi-tag{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--ink-light);margin-bottom:12px}
.bub-info .bi-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px dashed var(--rule);font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint)}
.bub-info .bi-row b{font-family:var(--display);font-size:16px;color:var(--ink);letter-spacing:0}
.bub-info .bi-verdict{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--ink-light);margin-top:12px;line-height:1.5}
.bub-info a{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--gold-deep);text-decoration:none;display:inline-block;margin-top:10px;border-bottom:1px solid var(--gold-pale)}

/* MODULE 2 matrix */
.matrix-grid{display:grid;grid-template-columns:1fr 290px;gap:22px;align-items:start}
@media(max-width:860px){.matrix-grid{grid-template-columns:1fr}}
.matrix-side{border-left:2px solid var(--gold);padding-left:18px;align-self:stretch;min-height:250px}
@media(max-width:860px){.matrix-side{border-left:none;border-top:1px solid var(--rule);padding-left:0;padding-top:18px}}
.ms-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ms-flag{font-size:24px}
.ms-ag{font-family:var(--display);font-weight:700;font-size:17px;color:var(--ink)}
.ms-crit{font-family:var(--sans);font-weight:600;font-size:14px;color:var(--ink)}
.ms-ax{display:block;font-family:var(--mono);font-size:7.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);margin-top:3px}
.ms-score{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:25px;margin:14px 0 6px}
.ms-lvl{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px}
.ms-note{font-size:13.5px;color:var(--ink-light);line-height:1.55;margin-bottom:16px}
.ms-link{display:inline-block;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-deep);text-decoration:none;border:1px solid var(--gold);border-radius:5px;padding:9px 14px;transition:all .2s}
.ms-link:hover{background:var(--gold);color:#23201A}
.matrix-scroll{overflow-x:auto}
table.matrix{border-collapse:collapse;width:100%;min-width:540px}
table.matrix th,table.matrix td{border:1px solid var(--rule-soft);text-align:center}
table.matrix thead th{position:sticky;top:0;background:var(--paper2);font-family:var(--mono);font-size:9px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-light);padding:8px 4px;font-weight:500}
table.matrix thead th .mflag{font-size:17px;display:block;margin-bottom:3px}
table.matrix thead th.crit-h{text-align:left;width:150px;min-width:120px}
table.matrix tbody th{text-align:left;font-family:var(--sans);font-weight:500;font-size:11.5px;color:var(--ink);padding:7px 10px;background:var(--card)}
table.matrix tbody th .ax{display:block;font-family:var(--mono);font-size:7.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);margin-top:3px}
.cell{font-family:var(--mono);font-weight:700;font-size:12px;cursor:pointer;height:34px;color:#fff;transition:transform .12s,box-shadow .12s}
.cell:hover{transform:scale(1.12);box-shadow:0 0 0 2px var(--ink);z-index:3;border-radius:3px}
.cell.sel{box-shadow:0 0 0 3px var(--ink);z-index:4;border-radius:3px}
tbody tr.hot th,thead th.hot{background:var(--gold-pale)!important;color:var(--ink)!important}
.matrix-detail{border-top:1px solid var(--rule);padding:22px clamp(16px,2vw,28px);background:var(--paper2);min-height:96px;display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.md-score{flex:0 0 auto;width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:29px;color:#fff}
.md-body{flex:1 1 280px}
.md-crit{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:4px}
.md-title{font-family:var(--display);font-weight:700;font-size:18px;margin-bottom:6px}
.md-note{font-size:14px;color:var(--ink-light);line-height:1.55}
.md-placeholder{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--ink-faint)}
.scale-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;align-items:center}
.scale-legend .sl{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)}
.scale-legend .sw{width:14px;height:14px;border-radius:3px;display:inline-block}

/* MODULE 3 radar */
.radar-grid{display:grid;grid-template-columns:1fr 250px;gap:28px;align-items:center}
@media(max-width:840px){.radar-grid{grid-template-columns:1fr}}
.radar-svg{width:100%;height:auto;display:block;overflow:visible}
.radar-axis{stroke:var(--rule)} .radar-ring{fill:none;stroke:var(--rule-soft)}
.radar-label{font-family:var(--mono);font-size:7.4px;fill:var(--ink-faint)}
.radar-poly{stroke-width:2;transition:opacity .4s;pointer-events:none}
.toggle-list{display:flex;flex-direction:column;gap:8px}
.toggle{display:flex;align-items:center;gap:10px;border:1px solid var(--rule);background:var(--card);border-radius:4px;padding:9px 12px;cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--ink-light);transition:all .2s;text-align:left;width:100%}
.toggle .sw{width:13px;height:13px;border-radius:3px;flex-shrink:0;border:1.5px solid currentColor}
.toggle .tflag{font-size:14px}.toggle .tname{flex:1}
.toggle .tsc{font-family:var(--display);font-weight:700;font-size:14px;color:var(--ink)}
.toggle.off{opacity:.45;filter:grayscale(.6)} .toggle.off .sw{background:transparent!important}
.toggle:hover{border-color:var(--gold)} .toggle.locked{cursor:default;border-color:var(--red)}

/* MODULE 4 duel */
.duel-pick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.duel-pick button{font-family:var(--mono);font-size:11px;color:var(--ink-light);background:var(--card);border:1px solid var(--rule);border-radius:4px;padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s}
.duel-pick button .f{font-size:15px}
.duel-pick button:hover{border-color:var(--gold)}
.duel-pick button.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.duel-pick button.active .duel-sub{color:var(--gold)}
.duel-sub{font-family:var(--mono);font-size:8px;color:var(--muted)}
.duel-top{display:grid;grid-template-columns:1fr 60px 1fr}
@media(max-width:680px){.duel-top{grid-template-columns:1fr}}
.duel-side{padding:22px 24px}
.duel-side.mor{background:color-mix(in srgb,var(--red) 9%,var(--card));border-bottom:3px solid var(--red)}
.duel-side.opp{background:color-mix(in srgb,var(--gold) 11%,var(--card));border-bottom:3px solid var(--gold);text-align:left}
.duel-vs{display:flex;align-items:center;justify-content:center;font-family:var(--display);font-style:italic;font-weight:700;font-size:17px;color:var(--muted);background:var(--paper2)}
@media(max-width:680px){.duel-side.opp{text-align:left}.duel-vs{padding:8px}}
.duel-flag{font-size:30px}
.duel-name{font-family:var(--display);font-weight:700;font-size:19px;margin-top:5px}
.duel-tag{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--ink-light)}
.duel-big{font-family:var(--display);font-weight:900;font-size:44px;line-height:1;margin-top:12px}
.duel-big.mor{color:var(--red)} .duel-big.opp{color:var(--gold-deep)}
.duel-big small{font-family:var(--mono);font-size:12px;font-weight:400;color:var(--ink-faint)}
.duel-cmt{margin-top:14px;border-top:1px dashed var(--rule);padding-top:12px;text-align:left}
.duel-cmt .dcl{font-family:var(--mono);font-size:8px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:6px}
.duel-side.mor .dcl{color:var(--red)} .duel-side.opp .dcl{color:var(--gold-deep)}
.duel-cmt .dct{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--ink);line-height:1.5}
.duel-bars{padding:20px clamp(16px,2vw,26px)}
.duel-bars h4{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:14px}
.dbar{margin-bottom:12px}
.dbar-top{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--ink-light);margin-bottom:5px}
.dbar-top .gap{color:var(--red);font-weight:700}
.dbar-track{position:relative;height:9px;background:var(--rule-soft);border-radius:5px;overflow:hidden}
.dbar-opp{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-deep));border-radius:5px;width:0;transition:width 1s cubic-bezier(.2,.8,.2,1)}
.dbar-mor{position:absolute;left:0;top:0;height:100%;background:var(--red);border-radius:5px;width:0;opacity:.85;transition:width 1s cubic-bezier(.2,.8,.2,1)}
.dbar-mor::after{content:"";position:absolute;right:-1px;top:-3px;width:2px;height:15px;background:var(--ink)}
.duel-verdict{padding:0 clamp(16px,2vw,26px) 22px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:680px){.duel-verdict{grid-template-columns:1fr}}
.dv-box{border:1px solid var(--rule);border-radius:5px;padding:15px 17px;background:var(--paper)}
.dv-box .dvl{font-family:var(--mono);font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:7px}
.dv-box.opp .dvl{color:var(--gold-deep)} .dv-box.mor .dvl{color:var(--red)}
.dv-box .dvt{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ink);line-height:1.55}

/* SIMULATOR */
.sim-grid{display:grid;grid-template-columns:1fr 320px;gap:26px;align-items:start}
@media(max-width:880px){.sim-grid{grid-template-columns:1fr}}
.sim-lever{margin-bottom:16px}
.sim-lever .sl-top{display:flex;justify-content:space-between;font-size:13px;color:var(--ink);margin-bottom:6px}
.sim-lever .sl-top span:last-child{font-family:var(--mono);font-size:11px;color:var(--gold-deep);font-weight:700}

.cchart-card{background:var(--card);border:1px solid var(--rule);border-radius:8px;padding:20px;box-shadow:var(--shadow)}
.cchart-top{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:12px}

.cchart-top .ctotl{font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint)}
.cchart-svg{width:100%;height:auto;display:block}
.clegend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px}
.clegend span{font-family:var(--mono);font-size:8.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-faint);display:flex;align-items:center;gap:5px}
.clegend i{width:10px;height:10px;border-radius:2px;display:inline-block}
.chyp{margin-top:18px;border:1px solid var(--rule);border-radius:6px;overflow:hidden}
.chyp summary{cursor:pointer;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-deep);padding:13px 18px;background:var(--paper2);list-style:none}
.chyp summary::-webkit-details-marker{display:none}
.chyp summary::before{content:"+ ";color:var(--gold);font-weight:700}
.chyp[open] summary::before{content:"– "}
.chyp-body{padding:16px 18px;font-size:12.5px;color:var(--ink-light);line-height:1.55}
.chyp-body table{width:100%;border-collapse:collapse;margin:10px 0}

.chyp-body .src{font-size:11px;color:var(--ink-faint);margin-top:10px;line-height:1.5}
.cdisc{font-family:var(--serif);font-style:italic;font-size:13.5px;color:var(--ink-light);margin-top:16px;padding-left:16px;border-left:3px solid var(--gold)}
.croi-kpis{display:flex;gap:14px;flex-wrap:wrap;margin:8px 0 14px}

.croi-hyp-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start;margin-top:18px}

 // continents abstraits (décoratifs, faibles)
 g+='<g class="geo-land">'+
   '<path d="M120,150 q40,-60 120,-40 q60,20 40,90 q-20,80 -90,90 q-90,10 -100,-60 q-10,-50 30,-80 Z"/>'+
   '<path d="M250,300 q30,-30 70,-10 q40,40 10,110 q-30,60 -70,30 q-40,-40 -30,-90 Z"/>'+
   '<path d="M470,120 q60,-50 150,-25 q40,20 30,70 q-10,40 -70,55 q-30,60 -90,40 q-70,-25 -60,-100 q5,-40 30,-55 Z"/>'+

 ORDER.forEach(function(k){if(k==="morocco")return;var p=GEO[k];var mx=projX(m.lon),my=projY(m.lat),px=projX(p.lon),py=projY(p.lat);var cx=(mx+px)/2,cy=Math.min(my,py)-40;g+='<path class="geo-arc" d="M'+mx+','+my+' Q'+cx+','+cy+' '+px+','+py+'"/>';});

function renderBubble(){
 el("m1tag").textContent=t().m1tag;el("m1title").innerHTML=t().m1title[0]+"<em>"+t().m1title[1]+"</em>";el("m1lead").textContent=t().m1lead;
 el("m1ti").textContent=t().m1ti;el("m1note").innerHTML=t().m1note;
 var svg=el("bubbleSvg");var W=760,H=560,P=64;
 function x(v){return P+(v/100)*(W-P-30);} function y(v){return (H-P)-(v/100)*(H-P-30);}
 var parts='<rect x="'+P+'" y="30" width="'+(W-P-30)+'" height="'+(H-P-30)+'" fill="var(--card)"/>';
 for(var g=0;g<=100;g+=25){parts+='<line x1="'+x(g)+'" y1="30" x2="'+x(g)+'" y2="'+(H-P)+'" stroke="var(--rule-soft)"/><line x1="'+P+'" y1="'+y(g)+'" x2="'+(W-30)+'" y2="'+y(g)+'" stroke="var(--rule-soft)"/>';}
 parts+='<text class="bub-quadrant" x="'+(W-36)+'" y="46" text-anchor="end">'+t().quadTop+'</text>';
 parts+='<text class="bub-quadrant" x="'+(P+8)+'" y="'+(H-P-8)+'">'+t().quadBot+'</text>';
 parts+='<text class="bubble-axis-label" x="'+(W/2)+'" y="'+(H-18)+'" text-anchor="middle">'+t().axX+'</text>';
 parts+='<text class="bubble-axis-label" x="18" y="'+(H/2)+'" text-anchor="middle" transform="rotate(-90 18 '+(H/2)+')">'+t().axY+'</text>';
 // anti-chevauchement : décalage vertical des labels proches
 var placed=[];
 ORDER.forEach(function(k,i){var a=AG[k];var r=12+a.global*7.4;var cx=x(a.tech),cy=y(a.market);
   var ly=cy+r+14;placed.forEach(function(pp){if(Math.abs(pp.x-cx)<70&&Math.abs(pp.y-ly)<14){ly=pp.y+14;}});placed.push({x:cx,y:ly});
   parts+='<g class="bubble-node" data-k="'+k+'" tabindex="0">'+
     '<circle class="fill" cx="'+cx+'" cy="'+cy+'" r="0" fill="'+a.color+'" fill-opacity="'+(k==="morocco"?.92:.78)+'" stroke="var(--card)" stroke-width="2" style="transition-delay:'+(i*90)+'ms"/>'+
     '<text class="bubble-flag" x="'+cx+'" y="'+(cy+6)+'" text-anchor="middle">'+a.flag+'</text>'+
     '<text class="bubble-name" x="'+cx+'" y="'+ly+'" text-anchor="middle">'+a.short+'</text></g>';
 });
 svg.innerHTML=parts;
 requestAnimationFrame(function(){ORDER.forEach(function(k){var a=AG[k];svg.querySelector('g[data-k="'+k+'"] .fill').setAttribute("r",12+a.global*7.4);});});
 svg.querySelectorAll(".bubble-node").forEach(function(n){var k=n.dataset.k;["mouseenter","focus","click"].forEach(function(ev){n.addEventListener(ev,function(){showBub(k);});});});
 showBub("turkey");
}

   '<div class="bi-row">'+t().biGlobal+'<b style="color:'+a.color+'">'+a.global.toFixed(1)+'/5</b></div>'+
   '<div class="bi-row">'+t().biTech+'<b>'+a.tech+'/100</b></div>'+
   '<div class="bi-row">'+t().biMarket+'<b>'+a.market+'/100</b></div>'+
   '<div class="bi-verdict">« '+L(a.verdict)+' »</div>'+
   '<a href="'+a.url+'" target="_blank" rel="noopener">'+t().biSource+'</a>';}

 var years=[],cum=0;

     '<tr><td>'+tt.cFoncier+'</td><td>'+s.constr.toLocaleString()+' MAD/m²</td></tr>'+
     '<tr><td>'+tt.cEquip+'</td><td>'+s.equip.toLocaleString()+' MAD/'+(lang==="fr"?"poste":"job")+'</td></tr>'+
     '<tr><td>'+(lang==="fr"?"Charges fixes":"Fixed charges")+'</td><td>'+s.fixM2.toLocaleString()+' MAD/m²/'+(lang==="fr"?"an":"yr")+'</td></tr>'+
     '<tr><td>'+(lang==="fr"?"Charges variables":"Variable charges")+'</td><td>'+s.varEmp.toLocaleString()+' MAD/'+(lang==="fr"?"emploi/an":"job/yr")+'</td></tr>'+
     '<tr><td>'+(lang==="fr"?"Charges patronales":"Employer charges")+'</td><td>'+Math.round(COSTK.charges*100)+'%</td></tr>'+
     '<tr><td>'+(lang==="fr"?"Inflation annuelle":"Annual inflation")+'</td><td>'+Math.round(COSTK.infl*100)+'%</td></tr>'+
   '</table><div class="src">'+tt.cSrc+'</div></div></details></div>'+
   '<div class="cdisc">'+tt.cDisc+'</div>';
 el("costResults").innerHTML=html;
 drawCostChart(years);
 drawRoiChart(pnl);
}
function drawRoiChart(pnl){
 var svg=el("roiChart");if(!svg)return;
 var W=600,H=240,PL=66,PB=30,PT=14;
 var maxN=0,minN=0,maxC=-Infinity,minC=Infinity;
 pnl.forEach(function(p){if(p.net>maxN)maxN=p.net;if(p.net<minN)minN=p.net;if(p.cum>maxC)maxC=p.cum;if(p.cum<minC)minC=p.cum;});
 var hi=Math.max(maxN,maxC,0), lo=Math.min(minN,minC,0); if(hi===lo)hi=lo+1;
 function Y(v){return PT+(H-PT-PB)*(1-(v-lo)/(hi-lo));}
 var n=pnl.length, slot=(W-PL-16)/n, bw=Math.min(56,slot*0.46);
 var g='<line x1="'+PL+'" y1="'+Y(0).toFixed(1)+'" x2="'+(W-10)+'" y2="'+Y(0).toFixed(1)+'" stroke="var(--ink-faint)" stroke-dasharray="2 3"/>';
 [hi,0,lo].forEach(function(v){g+='<text x="'+(PL-8)+'" y="'+(Y(v)+3).toFixed(1)+'" text-anchor="end" font-family="var(--mono)" font-size="8" fill="var(--ink-faint)">'+shortMoney(v)+'</text>';});
 pnl.forEach(function(p,idx){var cx=PL+slot*idx+slot/2, x=cx-bw/2, y0=Y(0), yv=Y(p.net), top=Math.min(y0,yv), hh=Math.abs(yv-y0);
   g+='<rect x="'+x.toFixed(1)+'" y="'+top.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+Math.max(0.5,hh).toFixed(1)+'" fill="'+(p.net>=0?"var(--green)":"var(--red)")+'" opacity="0.82"/>';
   g+='<text x="'+cx.toFixed(1)+'" y="'+(H-PB+15)+'" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="var(--ink-light)">'+t().cYear+" "+p.y+'</text>';});
 var pts=pnl.map(function(p,idx){var cx=PL+slot*idx+slot/2;return cx.toFixed(1)+","+Y(p.cum).toFixed(1);}).join(" ");
 g+='<polyline points="'+pts+'" fill="none" stroke="var(--gold-deep)" stroke-width="2.5"/>';
 pnl.forEach(function(p,idx){var cx=PL+slot*idx+slot/2;g+='<circle cx="'+cx.toFixed(1)+'" cy="'+Y(p.cum).toFixed(1)+'" r="3.6" fill="var(--gold-deep)"/>';});
 svg.innerHTML=g;
}
function drawCostChart(years){
 var svg=el("costChart");if(!svg)return;
 var W=600,H=280,PL=66,PB=34,PT=14;var max=0;
 years.forEach(function(y){if(y.tot>max)max=y.tot;});if(max<=0)max=1;
 var n=years.length;var slot=(W-PL-16)/n;var bw=Math.min(76,slot*0.6);
 var g="";
 for(var i=0;i<=4;i++){var gy=PT+(H-PT-PB)*(i/4);var val=max*(1-i/4);
   g+='<line x1="'+PL+'" y1="'+gy.toFixed(1)+'" x2="'+(W-10)+'" y2="'+gy.toFixed(1)+'" stroke="var(--rule-soft)"/>';
   g+='<text x="'+(PL-8)+'" y="'+(gy+3).toFixed(1)+'" text-anchor="end" font-family="var(--mono)" font-size="8" fill="var(--ink-faint)">'+shortMoney(val)+'</text>';}
 years.forEach(function(y,idx){
   var cx=PL+slot*idx+slot/2;var x=cx-bw/2;
   var segs=[["cap","var(--blue)"],["rh","#9A7B1E"],["fixes","var(--gold)"],["vari","#D4B863"]];
   var acc=0;
   segs.forEach(function(sg){var v=y[sg[0]];if(v<=0)return;var hh=(H-PT-PB)*(v/max);var yy=(H-PB)-acc-hh;acc+=hh;
     g+='<rect x="'+x.toFixed(1)+'" y="'+yy.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+Math.max(0,hh).toFixed(1)+'" fill="'+sg[1]+'"/>';});
   g+='<text x="'+cx.toFixed(1)+'" y="'+(H-PB+16)+'" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="var(--ink-light)">'+t().cYear+" "+y.y+'</text>';
   g+='<text x="'+cx.toFixed(1)+'" y="'+((H-PB)-acc-6).toFixed(1)+'" text-anchor="middle" font-family="var(--mono)" font-size="8" font-weight="700" fill="var(--ink)">'+shortMoney(y.tot)+'</text>';
 });
 svg.innerHTML=g;
}

function renderVerdict(){
 el("m7tag").textContent=t().m7tag;el("m7title").innerHTML=t().m7title[0]+"<em>"+t().m7title[1]+"</em>";el("m7lead").textContent=t().m7lead;
 el("vtable").innerHTML='<div class="vcol a"><div class="vh">'+t().vA.h+'</div><ul>'+t().vA.items.map(function(x){return '<li>'+x+'</li>';}).join("")+'</ul></div>'+
   '<div class="vcol b"><div class="vh">'+t().vB.h+'</div><ul>'+t().vB.items.map(function(x){return '<li>'+x+'</li>';}).join("")+'</ul></div>';
 el("verdictQuote").innerHTML='<p>'+t().verdictQuote+'</p><div class="src">'+t().verdictSrc+'</div>';
 el("baroLinks").innerHTML='<span style="font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);align-self:center">'+t().baroIntro+'</span>'+
   t().baro.map(function(b){return '<a href="'+b.u+'" target="_blank" rel="noopener"><b>'+b.n+'</b> '+b.t+' ↗</a>';}).join("");
}

/* =========================================================================
   MODULE 8 : PLAN + CTA + FOOTER
   ========================================================================= */
function renderPlan(){
 el("m8tag").textContent=t().m8tag;el("m8title").innerHTML=t().m8title[0]+"<em>"+t().m8title[1]+"</em>";el("m8lead").textContent=t().m8lead;
 el("planChantiers").innerHTML=PLAN.map(function(c){return '<div class="chantier"><h3><span class="cn">'+c.n+'</span>'+L(c.t)+'</h3><div class="csub">'+L(c.sub)+'</div>'+
   '<div class="lev-row">'+c.items.map(function(it,i){return '<details class="lever"><summary><span class="lhead"><span class="lt">'+L(it)+'</span><span class="lo">'+c.n+'.'+(i+1)+'</span></span><span class="lplus">+</span></summary><div class="lx">'+L(it.x)+'</div></details>';}).join("")+'</div></div>';}).join("");
 el("cta").innerHTML='<h3>'+t().ctaH[0]+'<br><em>'+t().ctaH[1]+'</em></h3><p>'+t().ctaP+'</p><a href="#m4">'+t().ctaBtn+'</a>';
 el("footer").innerHTML='<span><b>Buildfluence Intel</b>'+t().footL.replace("Buildfluence Intel","")+'</span><span>'+t().copyright+'</span><span>'+t().footR+'</span>';
 if(window.matchMedia&&window.matchMedia("(hover:hover)").matches){
   document.querySelectorAll("#planChantiers .lever").forEach(function(d){
     d.addEventListener("mouseenter",function(){d.open=true;});
     d.addEventListener("mouseleave",function(){d.open=false;});
     var sm=d.querySelector("summary");
     if(sm){sm.addEventListener("click",function(ev){ev.preventDefault();});}
   });
 }
}

/* =========================================================================
   COUNTDOWN + COUNT-UP + ORCHESTRATION
   ========================================================================= */
function updateCountdown(){var target=new Date("2030-06-08T00:00:00");var now=new Date();var d=Math.max(0,Math.ceil((target-now)/86400000));el("countdown").innerHTML=t().count.replace("{d}",d.toLocaleString(lang==="fr"?"fr-FR":"en-US"));}
function countUp(){document.querySelectorAll("[data-cu]").forEach(function(e){var target=parseFloat(e.getAttribute("data-cu"));if(!target)return;var cur=0;var step=target/30;var iv=setInterval(function(){cur+=step;if(cur>=target){cur=target;clearInterval(iv);}e.textContent=Number.isInteger(target)?Math.round(cur):cur.toFixed(1);},22);});}

function renderAll(){renderChrome();renderHero();renderMethodo();renderBubble();renderMatrix();renderRadar();renderDuel();renderFoncier();renderSim();renderCost();renderVerdict();renderPlan();updateCountdown();}

function setLang(l){lang=l;renderAll();}
function setTheme(th){theme=th;document.documentElement.setAttribute("data-theme",th);el("themeBtn").textContent=theme==="light"?t().theme[0]:t().theme[1];}

document.querySelectorAll(".switch button").forEach(function(b){b.addEventListener("click",function(){setLang(b.dataset.lang);});});
el("themeBtn").addEventListener("click",function(){setTheme(theme==="light"?"dark":"light");});

/* synchronisation langue quand intégré dans l'app (postMessage) */
window.addEventListener("message",function(e){var d=e.data||{};var l=null;
 if(d.type==="SET_LANGUAGE"&&d.lang){l=String(d.lang).toLowerCase().indexOf("en")===0?"en":"fr";}
 if(d.type==="bf-lang"&&d.lang){l=String(d.lang).toLowerCase().indexOf("en")===0?"en":"fr";}
 if(l){var sw=document.querySelector(".switch");if(sw){sw.style.display="none";}if(l!==lang){setLang(l);}}
});

/* boot : langue initiale depuis ?lang= (passée par l'app) */
try{var _qp=new URLSearchParams(location.search).get("lang");if(_qp&&_qp.toLowerCase().indexOf("en")===0){lang="en";}}catch(e){}
renderAll();
setInterval(updateCountdown,3600000);
var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);if(e.target.id==="statstrip"){countUp();}}});},{threshold:.12});
document.querySelectorAll(".reveal").forEach(function(el2,i){el2.style.transitionDelay=(Math.min(i,6)*55)+"ms";io.observe(el2);});
</script>
